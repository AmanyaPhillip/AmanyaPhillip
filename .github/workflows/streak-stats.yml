name: Update GitHub Stats SVGs

on:
  schedule:
    - cron: "0 3 * * *" # Runs daily at 3 AM
  push:
    paths:
      - ".github/workflows/streak-stats.yml"
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      # 1. Main GitHub Stats & Languages (Original Style)
      - name: Generate GitHub Stats & Language Cards
        uses: anuraghazra/github-readme-stats-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          username: AmanyaPhillip
          output_dir: profile
          # Main stats card options
          stats_options: 'show_icons=true&theme=tokyonight&include_all_commits=true&count_private=true&hide_border=true&bg_color=0D1117'
          # Top languages card options
          langs_options: 'layout=compact&langs_count=8&theme=tokyonight&hide_border=true&bg_color=0D1117'

      # 2. GitHub Streak Stats (Your favorite)
      - name: Generate Streak SVG
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: AmanyaPhillip
          options: 'theme=tokyonight&background=0D1117&hide_border=true'
          path: profile/streak.svg

      # 3. Activity Graph (Original Visuals)
      - name: Generate Activity Graph SVG
        uses: ashutosh00710/github-readme-activity-graph@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: AmanyaPhillip
          THEME: tokyo-night
          BG_COLOR: 0D1117
          HIDE_BORDER: "true"
          CUSTOM_PATH: profile/activity-graph.svg

      # 4. Commit and Push everything safely
      - name: Commit and Push SVGs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update all GitHub stats SVGs with classic layouts" || exit 0
          git pull --rebase origin main
          git push
