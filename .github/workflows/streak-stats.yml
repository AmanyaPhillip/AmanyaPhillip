name: Update GitHub Stats SVGs

on:
  schedule:
    - cron: "0 3 * * *" # Runs daily at 3 AM
  push:
    paths:
      - ".github/workflows/streak-stats.yml"
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      # 1. Generate Streak Stats
      - name: Generate Streak SVG
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: AmanyaPhillip
          options: 'theme=tokyonight&background=0D1117&hide_border=true'
          path: profile/streak.svg

      # 2. Generate Main Stats & Top Languages
      - name: Generate GitHub Stats SVGs
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: AmanyaPhillip
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/New_York
          
          # Output configurations to match your current layout
          filename: profile/github-stats.svg
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_days: 14
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage

      # 3. Commit all generated files back to the repo
      - name: Commit and Push SVGs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update all GitHub stats SVGs" || exit 0
          git push
