name: Update GitHub Stats SVGs

on:
  schedule:
    - cron: "0 3 * * *" # Runs daily at 3 AM
  push:
    paths:
      - ".github/workflows/streak-stats.yml"
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      # Create directory for assets
      - name: Setup Profile Folder
        run: mkdir -p profile

   
      # 2. Download Classic Top Languages Card
      - name: Fetch Top Languages Card
        run: |
          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=AmanyaPhillip&layout=compact&langs_count=8&theme=tokyonight&hide_border=true&bg_color=0D1117" -o profile/top-langs.svg

      # 3. Generate Streak Stats (Using the action you verified works)
      - name: Generate Streak SVG
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: AmanyaPhillip
          options: 'theme=tokyonight&background=0D1117&hide_border=true'
          path: profile/streak.svg

      # 4. Download Classic Activity Graph
      - name: Fetch Activity Graph
        run: |
          curl -s "https://github-readme-activity-graph.vercel.app/graph?username=AmanyaPhillip&theme=tokyo-night&bg_color=0D1117&hide_border=true" -o profile/activity-graph.svg

      # 5. Commit and Push everything safely
      - name: Commit and Push SVGs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update all GitHub stats SVGs with original layouts" || exit 0
          git pull --rebase origin main
          git push
