name: Update GitHub Stats SVGs

on:
  schedule:
    - cron: "0 3 * * *" # Runs daily at 3 AM
  push:
    paths:
      - ".github/workflows/streak-stats.yml"
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      # 1. Generate Streak Stats
      - name: Generate Streak SVG
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: AmanyaPhillip
          options: 'theme=tokyonight&background=0D1117&hide_border=true'
          path: profile/streak.svg

      # 2. Generate Main Stats & Top Languages (Original Layout Style)
      - name: Generate GitHub Stats Cards
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: AmanyaPhillip
          base: header, activity, community, repositories
          config_timezone: America/New_York
          filename: profile/github-stats.svg
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used

      # 3. Generate Activity Graph locally
      - name: Generate Activity Graph SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: AmanyaPhillip
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          filename: profile/activity-graph.svg

      # 4. Pull, Commit, and Push all generated files safely
      - name: Commit and Push SVGs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update all GitHub stats SVGs" || exit 0
          git pull --rebase origin main
          git push
