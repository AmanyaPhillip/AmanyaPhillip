<svg width="1200" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="40%" style="stop-color:#1a1b4b"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9ff"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#00d9ff"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#00d9ff;stop-opacity:0.8"/>
      <stop offset="70%" style="stop-color:#a78bfa;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="220" fill="url(#bgGrad)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="1.5" cy="1.5" r="1" fill="#ffffff" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="220" fill="url(#dots)"/>

  <!-- Glow orb left -->
  <circle cx="180" cy="110" r="80" fill="#00d9ff" opacity="0.05"/>
  <!-- Glow orb right -->
  <circle cx="1020" cy="110" r="80" fill="#a78bfa" opacity="0.05"/>

  <!-- Name -->
  <text
    x="600" y="108"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="58"
    font-weight="700"
    fill="url(#nameGrad)"
    text-anchor="middle"
    filter="url(#glow)"
    letter-spacing="2"
  >Amanya Phillip</text>

  <!-- Divider line -->
  <rect x="200" y="124" width="800" height="1.5" fill="url(#lineGrad)" rx="1"/>

  <!-- Tagline -->
  <text
    x="600" y="160"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="17"
    fill="#8b949e"
    text-anchor="middle"
    letter-spacing="1"
  >Agentic AI Engineer  &#xb7;  Flutter &amp; Web Dev  &#xb7;  Uganda &#x2192; Canada</text>

  <!-- Bottom wave -->
  <path d="M0,190 C150,175 300,205 450,190 C600,175 750,205 900,190 C1050,175 1150,198 1200,190 L1200,220 L0,220 Z" fill="#161b22" opacity="0.6"/>
</svg>
